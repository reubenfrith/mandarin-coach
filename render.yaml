# Render deployment config — https://render.com/docs/render-yaml
# Dependency management via uv (pyproject.toml + uv.lock).

services:
  - type: web
    name: mandarin-coach
    runtime: python
    buildCommand: pip install uv && uv sync --frozen
    startCommand: uv run chainlit run app/main.py --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENAI_API_KEY        # OpenAI embeddings baseline
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: LANGSMITH_API_KEY
        sync: false
      - key: LANGSMITH_TRACING
        value: "true"
